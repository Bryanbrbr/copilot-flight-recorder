services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_PATH=/app/data/flight_recorder.db
      - MSAL_CLIENT_ID=${MSAL_CLIENT_ID:-}
      - MSAL_TENANT_ID=${MSAL_TENANT_ID:-}
    volumes:
      - cfr-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  cfr-data:
    driver: local
